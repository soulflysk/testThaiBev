@if (isVisible) {
<div class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3>ยืนยันการอนุมัติ</h3>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label for="approval-reason">เหตุผล:</label>
        <textarea 
          id="approval-reason" 
          [(ngModel)]="reason" 
          placeholder="กรุณาระบุเหตุผลการอนุมัติ"
          rows="4"
          class="form-control">
        </textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button (click)="onApprove()" [disabled]="!reason.trim()" class="btn btn-approve">
        อนุมัติ
      </button>
      <button (click)="onCancel()" class="btn btn-cancel">
        ยกเลิก
      </button>
    </div>
  </div>
</div>
}
