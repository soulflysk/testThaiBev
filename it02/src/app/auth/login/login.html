<div class="login-container">
  <div class="login-form">
    <h2>IT 02-1 Login Form</h2>
    
    <div class="form-group">
      <label for="username">User:</label>
      <input 
        type="text" 
        id="username" 
        [(ngModel)]="username" 
        name="username"
        class="form-control"
        placeholder="กรอกชื่อผู้ใช้"
      />
    </div>

    <div class="form-group">
      <label for="password">Password:</label>
      <input 
        type="password" 
        id="password" 
        [(ngModel)]="password" 
        name="password"
        class="form-control"
        placeholder="กรอกรหัสผ่าน"
      />
    </div>

    <div class="error-message" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <div class="button-group">
      <button 
        type="button" 
        class="btn btn-primary" 
        (click)="onLogin()"
        [disabled]="!username || !password || isLoading"
      >
        <span *ngIf="!isLoading">ลงชื่อเข้าใช้งาน</span>
        <span *ngIf="isLoading">กำลังดำเนินการ...</span>
      </button>
      
      <button 
        type="button" 
        class="btn btn-secondary" 
        (click)="onRegister()"
      >
        สมัครสมาชิก
      </button>
    </div>
  </div>
</div>
