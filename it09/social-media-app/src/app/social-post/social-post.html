<div class="social-post">
  <!-- Header -->
  <div class="header">
    <h2>IT 08-1</h2>
  </div>

  <!-- Post Content -->
  <div class="post-content">
    <div class="user-info">
      <div class="avatar">
        <img src="https://picsum.photos/seed/user123/40/40.jpg" alt="User avatar">
      </div>
      <div class="user-details">
        <span class="username">Change can</span>
        <span class="post-date">16 October 2021 16:00</span>
      </div>
    </div>
    
    <div class="post-image">
      <img src="https://picsum.photos/seed/puppykitten/500/400.jpg" alt="Puppy and kitten">
    </div>
  </div>

  <!-- Comments Section -->
  <div class="comments-section">
    <div class="existing-comments">
      <div class="comment">
        <div class="comment-avatar">
          <img src="https://picsum.photos/seed/blend285/32/32.jpg" alt="Comment avatar">
        </div>
        <div class="comment-content">
          <span class="comment-username">Blend 285</span>
          <p class="comment-text">have a good day</p>
        </div>
      </div>
    </div>

    <!-- New Comments Display -->
    <div class="new-comments" *ngIf="newComments.length > 0">
      <div class="comment" *ngFor="let comment of newComments; trackBy: trackByComment">
        <div class="comment-avatar">
          <img src="https://picsum.photos/seed/blend285/32/32.jpg" alt="Comment avatar">
        </div>
        <div class="comment-content">
          <span class="comment-username">Blend 285</span>
          <p class="comment-text">{{ comment.text }}</p>
        </div>
      </div>
    </div>

    <!-- Comment Input -->
    <div class="comment-input-section">
      <div class="comment-input-wrapper">
        <div class="comment-avatar">
          <img src="https://picsum.photos/seed/blend285/32/32.jpg" alt="Comment avatar">
        </div>
        <div class="input-container">
          <span class="comment-username">Blend 285</span>
          <input 
            type="text" 
            class="comment-input" 
            placeholder="Add a comment..."
            [(ngModel)]="newComment"
            (keyup.enter)="addComment()"
          >
        </div>
      </div>
    </div>
  </div>
</div>
